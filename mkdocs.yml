site_name: spieli
site_url: https://mfuhrmann.github.io/spieli/
repo_url: https://github.com/mfuhrmann/spieli
repo_name: mfuhrmann/spieli
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quick-start.md
  - Operations:
      - Manual Deploy: ops/manual-deploy.md
      - Configuration: ops/configuration.md
      - Troubleshooting: ops/troubleshooting.md
  - Contributing:
      - Add a Playground Device: contributing/add-device.md
      - Add a Sport Pitch Type: contributing/add-sport-type.md
  - Reference:
      - Architecture: reference/architecture.md
      - Tech Stack: reference/tech-stack.md
      - Federation: reference/federation.md
      - registry.json: reference/registry-json.md
      - Glossary: reference/glossary.md
  - Decisions:
      - ADR-0001 — OpenSpec sharing policy: adr/0001-openspec-sharing-policy.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
