# Host-level nginx reverse proxy for spieli.
#
# Place this file at /etc/nginx/sites-available/spieli.conf and symlink it:
#   ln -s /etc/nginx/sites-available/spieli.conf /etc/nginx/sites-enabled/
#
# Replace every occurrence of "example.com" with your actual domain.
# Run certbot once to fill in the ssl_certificate paths automatically:
#   certbot --nginx -d example.com
#
# Assumes the spieli Docker stack is running and bound to port 8080 (default).

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    # certbot will add a location block here for the ACME challenge.
    # After the first successful certificate issuance it will also add
    # a redirect to HTTPS — keep this block so renewal keeps working.
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name example.com;

    # Filled in by certbot:
    # ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy all traffic to the spieli Docker stack.
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for the PBF-import endpoint (long-running import).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "SAMEORIGIN"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
}
