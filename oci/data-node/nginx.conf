server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS resolver.
    resolver 127.0.0.11 ipv6=off valid=30s;

    # HTTP security headers
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Health check ────────────────────────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type "text/plain";
    }

    # ── version.json — baked in at image build time ──────────────────────────────
    location = /version.json {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # ── /api/ → PostgREST ────────────────────────────────────────────────────────
    location /api/ {
        set $postgrest_upstream http://postgrest:3000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $postgrest_upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS — allow the Hub (and any other origin) to query this data node.
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin  "*"             always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"  always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type" always;

        # Handle pre-flight requests.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Accept, Content-Type";
            add_header Content-Length 0;
            return 204;
        }

        proxy_connect_timeout  5s;
        proxy_read_timeout    60s;
    }

    # All other paths: 404 — this is a data node, not an SPA.
    location / {
        return 404;
    }
}
