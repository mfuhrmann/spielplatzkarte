server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver.
    resolver 127.0.0.11 ipv6=off valid=30s;

    # HTTP security headers
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(self)"               always;
    # 'unsafe-inline' in style-src is required by Bootstrap and OpenLayers; remove when a nonce-based approach is adopted.
    # frame-ancestors allows any HTTPS parent to embed this app (required for the Hub).
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-src https://panoramax.xyz https://api.panoramax.xyz; connect-src 'self' https:; font-src 'self'; frame-ancestors 'self' https:"
        always;

    # ── config.js — written at container startup from env vars ──────────────────
    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # ── /api/ → PostgREST (standalone mode only) ─────────────────────────────────
    # In hub mode this block is still present but the frontend does not call /api/
    # directly — it uses per-backend URLs fetched from the registry instead.
    location /api/ {
        set $postgrest_upstream http://postgrest:3000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $postgrest_upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow cross-origin requests so the Hub can query standalone instances.
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin  "*"             always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"  always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Accept, Content-Type";
            return 204;
        }

        proxy_connect_timeout  5s;
        proxy_read_timeout    60s;
    }

    # ── /api2/ → second PostgREST (Hub dev testing) ─────────────────────────────
    location /api2/ {
        set $postgrest2_upstream http://postgrest2:3000;
        rewrite ^/api2/(.*) /$1 break;
        proxy_pass $postgrest2_upstream;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin  "*"             always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS"  always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Accept, Content-Type";
            return 204;
        }

        proxy_connect_timeout  5s;
        proxy_read_timeout    60s;
    }

    # ── version.json — no caching, cross-origin for Hub ─────────────────────────
    location = /version.json {
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    # ── Vite-hashed static assets — long-term immutable caching ─────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
